<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue</title>

    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }

        img {
            max-width: 500px;
            width: 90%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>Bienvenue sur mon site !</h1>

    <img src="image.jpg" alt="Image d'accueil">

    <audio id="sound" src="son.mp3"></audio>

    <script>
        window.addEventListener("load", () => {
            const audio = document.getElementById("sound");

            audio.play().catch(() => {
                console.log("Autoplay bloqué par le navigateur.");
            });
        });
    </script>

</body>
</html>
